name: CI

"on":
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# Restrict the default GITHUB_TOKEN to read only. Jobs that need more
# (for example to upload release artifacts) opt in explicitly.
permissions:
  contents: read

# Cancel in-progress runs for the same ref so rapid pushes do not queue
# up redundant pipelines.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint with Ruff
        run: poetry run ruff check backend/ sdk/python/

      - name: Validate Python syntax
        run: |
          python -c "
          import ast, sys, pathlib
          errors = []
          for f in pathlib.Path('backend').glob('*.py'):
              try: ast.parse(f.read_text())
              except SyntaxError as e: errors.append(f'{f}: {e}')
          for f in pathlib.Path('sdk/python').rglob('*.py'):
              try: ast.parse(f.read_text())
              except SyntaxError as e: errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('All Python files valid')
          "

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: frontend
        run: npm run build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend and test dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run unit tests
        env:
          KEYCLOAK_ADMIN_USER: test-admin
          KEYCLOAK_ADMIN_PASSWORD: test-admin-password
          MONGODB_URL: mongodb://localhost:27017
          MONGODB_DB: rudra_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: unit-test-only-secret
        run: pytest tests/unit/ -v

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\")' || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend and test dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run integration tests
        env:
          KEYCLOAK_ADMIN_USER: test-admin
          KEYCLOAK_ADMIN_PASSWORD: test-admin-password
          MONGODB_URL: mongodb://localhost:27017
          MONGODB_DB: rudra_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: integration-test-only-secret
        run: pytest tests/integration/ -v

  security:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit backend requirements
        run: pip-audit --strict --requirement backend/requirements.txt

      - name: Audit Python SDK installed environment
        run: |
          python -m venv /tmp/sdk-audit-env
          /tmp/sdk-audit-env/bin/pip install --upgrade pip
          /tmp/sdk-audit-env/bin/pip install -e sdk/python
          /tmp/sdk-audit-env/bin/pip install pip-audit
          /tmp/sdk-audit-env/bin/pip-audit --strict

      - name: Audit frontend npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, frontend, unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t rudra-backend ./backend

      - name: Build frontend image
        run: docker build -t rudra-frontend ./frontend

  sdk-python:
    name: Validate Python SDK imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDK
        run: |
          cd sdk/python
          pip install -e .

      - name: Validate SDK imports
        run: |
          python -c "
          from rudra_sdk import RudraClient, RudraAPIError
          client = RudraClient('http://localhost:8000', token='test')
          assert client.token == 'test'
          assert hasattr(client, 'projects')
          assert hasattr(client, 'users')
          assert hasattr(client, 'organizations')
          assert hasattr(client, 'roles')
          assert hasattr(client, 'sso')
          assert hasattr(client, 'webhooks')
          assert hasattr(client, 'coupons')
          assert hasattr(client, 'analytics')
          print('Python SDK OK - all resources verified')
          "

  sdk-javascript:
    name: Validate JavaScript SDK imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate SDK
        run: |
          node --input-type=module -e "
          import { RudraClient, RudraAPIError } from './sdk/javascript/src/index.js';
          const client = new RudraClient('http://localhost:8000', { token: 'test' });
          console.assert(client.token === 'test');
          console.assert(client.projects !== undefined);
          console.assert(client.users !== undefined);
          console.assert(client.organizations !== undefined);
          console.assert(client.roles !== undefined);
          console.assert(client.sso !== undefined);
          console.assert(client.webhooks !== undefined);
          console.assert(client.coupons !== undefined);
          console.assert(client.analytics !== undefined);
          console.log('JavaScript SDK OK - all resources verified');
          "
